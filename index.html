<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Royale - AloneGarciatv</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        
        /* Animación de golpe en la flecha al detectar segmento */
        @keyframes arrow-bump {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            50% { transform: translateX(-50%) translateY(10px) scale(1.2); }
            100% { transform: translateX(-50%) translateY(0) scale(1); }
        }
        .bump { animation: arrow-bump 0.1s ease-out; }

        #winnerModal { display: none; }
        #winnerModal.show { display: flex; }
    </style>
</head>
<body class="min-h-screen text-white overflow-hidden flex flex-col md:flex-row">

    <canvas id="confettiCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

    <div class="w-full md:w-1/3 p-6 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shadow-2xl h-screen md:h-auto overflow-hidden relative">
        <h1 class="text-3xl font-black mb-1 text-pink-500 cyber-font italic">
            Alonso Battle Royale
        </h1>
        <p class="text-slate-500 text-[10px] tracking-[0.3em] uppercase mb-6">AloneGarciatv Edition</p>

        <div class="mb-6 flex gap-2">
            <form id="addForm" class="flex-1 flex gap-2">
                <input 
                    type="text" 
                    id="newItemInput"
                    placeholder="Nuevo objetivo..."
                    class="flex-1 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-pink-500 text-white"
                >
                <button type="submit" class="bg-pink-600 hover:bg-pink-500 p-2 rounded-lg transition-transform active:scale-95">
                    <i data-lucide="plus"></i>
                </button>
            </form>
            <button id="btnReset" title="Limpiar todo" class="bg-slate-700 hover:bg-red-600 p-2 rounded-lg">
                <i data-lucide="trash-2"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <h3 id="optionsCount" class="text-[10px] font-bold text-slate-400 mb-3 tracking-widest uppercase">
                OBJETIVOS: 0
            </h3>
            <ul id="itemList" class="space-y-2"></ul>
        </div>
    </div>

    <div class="flex-1 relative flex flex-col items-center justify-center p-4 bg-slate-950">
        
        <div class="relative z-10">
            <div id="wheelArrow" class="absolute top-[-40px] left-1/2 -translate-x-1/2 z-30 drop-shadow-[0_0_15px_rgba(236,72,153,0.8)]">
                <svg width="60" height="60" viewBox="0 0 60 60">
                    <path d="M0 0 L60 0 L30 45 L0 0" fill="#ec4899" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>

            <div id="wheelContainer" class="rounded-full border-[12px] border-slate-900 shadow-[0_0_80px_rgba(0,0,0,0.9)] transition-transform duration-[6000ms] ease-[cubic-bezier(0.1,0,0.1,1)]">
                <canvas id="wheelCanvas" class="rounded-full w-[340px] h-[340px] md:w-[520px] md:h-[520px]"></canvas>
            </div>
        </div>

        <button id="btnSpin" class="mt-12 px-16 py-5 rounded-none cyber-font text-2xl font-black italic tracking-widest text-white bg-pink-600 hover:bg-pink-500 transition-all disabled:opacity-20 border-b-4 border-pink-900 active:border-b-0 active:translate-y-1">
            ELIMINAR OBJETIVO
        </button>

        <div id="winnerModal" class="fixed inset-0 z-50 items-center justify-center bg-black/90 backdrop-blur-xl">
            <div class="bg-slate-900 border-t-4 border-pink-600 p-12 text-center max-w-sm w-full mx-4 shadow-2xl">
                <div id="modalIcon" class="mb-4 flex justify-center text-pink-500"></div>
                <h2 id="modalTitle" class="text-xs cyber-font text-slate-500 tracking-[0.4em] mb-4">SISTEMA_LOG</h2>
                <p id="winnerText" class="text-5xl font-black mb-8 break-words uppercase cyber-font"></p>
                <button id="btnCloseModal" class="w-full py-4 bg-pink-600 text-white font-bold hover:bg-pink-500 transition-all cyber-font italic">PROSEGUIR</button>
            </div>
        </div>
    </div>

    <script>
        // --- MOTOR AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, t, v, d) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const sounds = {
            tick: () => playSound(200, 'square', 0.05, 0.05),
            eliminated: () => { playSound(50, 'sawtooth', 0.3, 0.8); playSound(100, 'sine', 0.2, 0.5); },
            win: () => [261, 329, 392, 523].forEach((f, i) => setTimeout(() => playSound(f, 'triangle', 0.2, 0.6), i * 150))
        };

        const state = { items: [], lastEliminatedIdx: null, isSpinning: false, rotation: 0 };
        const dom = {
            canvas: document.getElementById('wheelCanvas'),
            container: document.getElementById('wheelContainer'),
            arrow: document.getElementById('wheelArrow'),
            itemList: document.getElementById('itemList'),
            input: document.getElementById('newItemInput'),
            spinBtn: document.getElementById('btnSpin'),
            modal: document.getElementById('winnerModal'),
            winnerText: document.getElementById('winnerText'),
            modalTitle: document.getElementById('modalTitle'),
            modalIcon: document.getElementById('modalIcon')
        };

        function renderList() {
            dom.itemList.innerHTML = '';
            document.getElementById('optionsCount').textContent = `OBJETIVOS: ${state.items.length}`;
            state.items.forEach((item, idx) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3 bg-slate-800/50 border-r-2 border-pink-600';
                li.innerHTML = `<span class="font-bold text-xs uppercase">${item}</span>
                    <button onclick="removeItem(${idx})" class="text-slate-500 hover:text-red-500"><i data-lucide="x" width="14"></i></button>`;
                dom.itemList.appendChild(li);
            });
            lucide.createIcons();
            dom.spinBtn.disabled = state.items.length < 2;
            drawWheel();
        }

        function drawWheel() {
            const ctx = dom.canvas.getContext('2d');
            const size = 1000; dom.canvas.width = size; dom.canvas.height = size;
            const centerX = 500, centerY = 500, radius = 480;
            ctx.clearRect(0,0,size,size);
            if (state.items.length === 0) return;

            const arcSize = (2 * Math.PI) / state.items.length;
            state.items.forEach((item, i) => {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * arcSize, (i + 1) * arcSize);
                ctx.fillStyle = i % 2 === 0 ? '#0f172a' : '#1e293b';
                ctx.fill();
                ctx.strokeStyle = "#ec4899"; ctx.lineWidth = 2; ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * arcSize + arcSize/2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff";
                ctx.font = "900 45px Orbitron";
                ctx.fillText(item.toUpperCase(), radius - 60, 15);
                ctx.restore();
            });
        }

        let lastTickIdx = -1;
        function checkTick() {
            if (!state.isSpinning) return;
            const style = window.getComputedStyle(dom.container);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = (Math.atan2(matrix.m12, matrix.m11) * 180 / Math.PI + 360) % 360;
            
            // Calculamos qué segmento está bajo la flecha (que está a 270 grados en el círculo trigonométrico)
            const arcDeg = 360 / state.items.length;
            const currentIdx = Math.floor(((270 - angle + 360) % 360) / arcDeg);

            if (currentIdx !== lastTickIdx) {
                sounds.tick();
                dom.arrow.classList.remove('bump');
                void dom.arrow.offsetWidth;
                dom.arrow.classList.add('bump');
                lastTickIdx = currentIdx;
            }
            requestAnimationFrame(checkTick);
        }

        function spin() {
            if (state.isSpinning || state.items.length < 2) return;
            audioCtx.resume();
            state.isSpinning = true;
            dom.spinBtn.disabled = true;
            
            const extra = Math.floor(Math.random() * 360);
            state.rotation += (360 * 8) + extra;
            dom.container.style.transform = `rotate(${state.rotation}deg)`;
            requestAnimationFrame(checkTick);
        }

        dom.container.addEventListener('transitionend', () => {
            state.isSpinning = false;
            const arcDeg = 360 / state.items.length;
            const finalAngle = state.rotation % 360;
            // La flecha está arriba (270°), calculamos quién quedó ahí
            const index = Math.floor(((270 - finalAngle + 360) % 360) / arcDeg);
            
            state.lastEliminatedIdx = index;
            dom.winnerText.textContent = state.items[index];
            dom.winnerText.className = "text-5xl font-black mb-8 text-pink-500 cyber-font";
            dom.modalIcon.innerHTML = '<i data-lucide="skull" width="80" height="80"></i>';
            sounds.eliminated();
            dom.modal.classList.add('show');
            lucide.createIcons();
        });

        document.getElementById('btnCloseModal').onclick = () => {
            dom.modal.classList.remove('show');
            if (state.lastEliminatedIdx !== null) {
                state.items.splice(state.lastEliminatedIdx, 1);
                state.lastEliminatedIdx = null;
                renderList();
                if (state.items.length === 1) setTimeout(proclaimWinner, 600);
            }
        };

        function proclaimWinner() {
            dom.modalTitle.textContent = "OBJETIVO_FINAL_RESTANTE";
            dom.winnerText.textContent = state.items[0];
            dom.winnerText.className = "text-5xl font-black mb-8 text-yellow-400 cyber-font";
            dom.modalIcon.innerHTML = '<i data-lucide="trophy" width="80" height="80"></i>';
            sounds.win();
            dom.modal.classList.add('show');
            lucide.createIcons();
            state.lastEliminatedIdx = null;
        }

        function removeItem(i) { state.items.splice(i,1); renderList(); }
        document.getElementById('addForm').onsubmit = (e) => {
            e.preventDefault();
            const val = dom.input.value.trim();
            if(val) { state.items.push(val); dom.input.value=''; renderList(); audioCtx.resume(); }
        };
        document.getElementById('btnReset').onclick = () => { if(confirm("¿BORRAR TODO?")) { state.items=[]; renderList(); } };
        dom.spinBtn.onclick = spin;

        renderList();
    </script>
</body>
</html>
